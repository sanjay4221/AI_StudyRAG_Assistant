[pytest]
# Run from: backend/ folder
# Command:  pytest

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short test summary — print test names as they run
addopts =
    -v
    --tb=short
    --no-header

# Suppress noisy warnings from third-party packages
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
